<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swipe Right on the Bite</title>
    <style>
        /* Core Layout */
        body { margin: 0; font-family: sans-serif; background: #333; display: flex; justify-content: center; height: 100vh; touch-action: none; }
        #app { width: 100%; max-width: 400px; background: white; height: 100%; display: flex; flex-direction: column; position: relative; }
        .screen { display: none; flex-direction: column; height: 100%; padding: 20px; text-align: center; box-sizing: border-box; justify-content: center;}
        .active { display: flex; }
        
        /* Top Bar & UI */
        .top-bar { background: #2c3e50; color: white; padding: 15px; }
        .rep-bar-bg { width: 100%; height: 15px; background: #555; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        #rep-bar { height: 100%; width: 0%; background: #27ae60; transition: width 0.3s, background 0.3s; }
        .stats { display: flex; justify-content: space-between; font-weight: bold; font-size: 1.1rem; }
        .danger { color: #e74c3c; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.5; } }
        
        /* The "Image" Area */
        #card-area { 
            flex-grow: 1; 
            background-color: #ecf0f1; 
            margin: 15px; 
            border-radius: 10px; 
            cursor: pointer;
        }
        
        /* Buttons */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; background: white; border-top: 1px solid #ddd; }
        button { padding: 15px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .btn-start { background: #27ae60; color: white; margin-top: 20px;}
        .btn-action { background: #ecf0f1; color: #2c3e50; }
        .btn-action:active { background: #bdc3c7; }
    </style>
</head>
<body>

<div id="app">
    <div id="start-screen" class="screen active">
        <h2>Welcome to OrthoGame</h2>
        <p><strong>⬅️ LEFT</strong> = Extract<br><strong>➡️ RIGHT</strong> = IPR<br><strong>⬆️ UP</strong> = Nothing<br><strong>⬇️ DOWN</strong> = Don't Know</p>
        <button class="btn-start" onclick="startGame()">Start Game</button>
    </div>

    <div id="game-screen" class="screen" style="padding:0; justify-content: flex-start;">
        <div class="top-bar">
            <div style="font-size: 12px; text-transform: uppercase;">Clinic Reputation</div>
            <div class="rep-bar-bg"><div id="rep-bar"></div></div>
            <div class="stats">
                <span id="timer">00:30</span>
                <span id="counter">Case 1/5</span>
            </div>
        </div>
        
        <div id="card-area"></div>
        
        <div class="grid">
            <button class="btn-action" onclick="makeChoice('up')">⬆️ Nothing</button>
            <button class="btn-action" onclick="makeChoice('down')">⬇️ Don't Know</button>
            <button class="btn-action" onclick="makeChoice('left')">⬅️ Extract</button>
            <button class="btn-action" onclick="makeChoice('right')">IPR ➡️</button>
        </div>
    </div>

    <div id="end-screen" class="screen">
        <h1 id="end-title">Game Over</h1>
        <p id="end-msg"></p>
        <h2 style="font-size: 3rem; margin: 10px 0;"><span id="final-score">0</span>%</h2>
        <p style="color: #7f8c8d; margin-bottom: 30px;">(Pass mark is 80%)</p>
        <button class="btn-start" onclick="location.reload()">Play Again</button>
    </div>
</div>

<script>
    // Game Data pointing directly to your PNG files
    const cases = [
        { time: 30, ans: 'left', image: 'case1.png' },
        { time: 25, ans: 'right', image: 'case2.png' },
        { time: 20, ans: 'left', image: 'case3.png' },
        { time: 15, ans: 'right', image: 'case4.png' },
        { time: 10, ans: 'up', image: 'case5.png' }
    ];

    let currentIndex = 0;
    let score = 0;
    let timeLeft = 0;
    let timerId = null;

    function startGame() {
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        currentIndex = 0;
        score = 0;
        updateScoreBar();
        loadCase();
    }

    function loadCase() {
        if (currentIndex >= cases.length) {
            endGame();
            return;
        }
        const current = cases[currentIndex];
        
        // Load the actual image into the background of the card area
        const cardArea = document.getElementById('card-area');
        cardArea.style.backgroundImage = `url('${current.image}')`;
        cardArea.style.backgroundSize = 'contain';
        cardArea.style.backgroundPosition = 'center';
        cardArea.style.backgroundRepeat = 'no-repeat';
        
        document.getElementById('counter').innerText = `Case ${currentIndex + 1}/5`;
        
        timeLeft = current.time;
        updateTimerUI();
        
        clearInterval(timerId);
        timerId = setInterval(() => {
            timeLeft--;
            updateTimerUI();
            if (timeLeft <= 0) {
                processAnswer('timeout');
            }
        }, 1000);
    }

    function updateTimerUI() {
        const t = document.getElementById('timer');
        t.innerText = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
        if (timeLeft <= 5) {
            t.classList.add('danger');
        } else {
            t.classList.remove('danger');
        }
    }

    function makeChoice(direction) {
        processAnswer(direction);
    }

    function processAnswer(direction) {
        clearInterval(timerId);
        const current = cases[currentIndex];
        
        // Scoring Logic
        if (direction === 'timeout') {
            score -= 30;
        } else if (direction === 'down') {
            score -= 5;
        } else if (direction === current.ans) {
            score += 20;
        } else {
            score -= 30;
        }
        
        updateScoreBar();
        currentIndex++;
        
        // Brief pause before next card so player sees the score change
        setTimeout(loadCase, 250); 
    }

    function updateScoreBar() {
        if (score > 100) score = 100;
        if (score < 0) score = 0;
        
        const bar = document.getElementById('rep-bar');
        bar.style.width = score + '%';
        
        // Color changes based on health
        if (score < 40) bar.style.background = '#e74c3c'; // Red
        else if (score < 80) bar.style.background = '#f1c40f'; // Yellow
        else bar.style.background = '#27ae60'; // Green
    }

    function endGame() {
        clearInterval(timerId);
        document.getElementById('game-screen').classList.remove('active');
        document.getElementById('end-screen').classList.add('active');
        
        document.getElementById('final-score').innerText = score;
        
        if (score >= 80) {
            document.getElementById('end-title').innerText = "Fantastic!";
            document.getElementById('end-msg').innerText = "You're an Ortho Wizard! Your schedule is booked out for months.";
        } else {
            document.getElementById('end-title').innerText = "Poor!";
            document.getElementById('end-msg').innerText = "Yikes, looks like you need to attend an Ortho course";
        }
    }

    // --- SWIPE / DRAG DETECTION ---
    let startX = 0, startY = 0;
    const cardArea = document.getElementById('card-area');

    // Mobile Touch
    cardArea.addEventListener('touchstart', e => {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
    });

    cardArea.addEventListener('touchend', e => {
        if (!startX || !startY) return;
        handleSwipe(startX, startY, e.changedTouches[0].clientX, e.changedTouches[0].clientY);
        startX = 0; startY = 0;
    });

    // Desktop Mouse Drag
    cardArea.addEventListener('mousedown', e => {
        startX = e.clientX;
        startY = e.clientY;
    });

    cardArea.addEventListener('mouseup', e => {
        if (!startX || !startY) return;
        handleSwipe(startX, startY, e.clientX, e.clientY);
        startX = 0; startY = 0;
    });

    function handleSwipe(sx, sy, ex, ey) {
        let dx = ex - sx;
        let dy = ey - sy;
        
        // Must swipe at least 40 pixels to register
        if (Math.abs(dx) < 40 && Math.abs(dy) < 40) return; 
        
        if (Math.abs(dx) > Math.abs(dy)) {
            // Horizontal swipe
            makeChoice(dx > 0 ? 'right' : 'left');
        } else {
            // Vertical swipe
            makeChoice(dy > 0 ? 'down' : 'up');
        }
    }
</script>

</body>
</html>
