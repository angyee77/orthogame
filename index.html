<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swipe Right on the Bite</title>
    <style>
        /* Core Layout - Fixed for Mobile Viewports */
        html, body { 
            margin: 0; 
            padding: 0;
            width: 100%;
            height: 100%; 
            height: 100dvh; 
            overflow: hidden; 
            font-family: sans-serif; 
            background: #333; 
            touch-action: none; 
        }
        
        #app { 
            width: 100%; 
            max-width: 400px; 
            height: 100%; 
            background: white; 
            display: flex; 
            flex-direction: column; 
            margin: 0 auto; 
        }
        
        .screen { display: none; flex-direction: column; height: 100%; padding: 20px; text-align: center; box-sizing: border-box; justify-content: center;}
        .active { display: flex; }
        
        /* Top Bar & UI */
        .top-bar { background: #2c3e50; color: white; padding: 12px 15px; flex: 0 0 auto; }
        .rep-bar-bg { width: 100%; height: 12px; background: #555; border-radius: 10px; margin: 8px 0; overflow: hidden; }
        #rep-bar { height: 100%; width: 0%; background: #27ae60; transition: width 0.3s, background 0.3s; }
        .stats { display: flex; justify-content: space-between; font-weight: bold; font-size: 1rem; }
        .danger { color: #e74c3c; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.5; } }
        
        /* The "Image" Area */
        #card-area { 
            flex: 1 1 auto; 
            min-height: 0; 
            background-color: #ecf0f1; 
            margin: 10px; 
            border-radius: 10px; 
        }
        
        /* Buttons */
        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            padding: 10px 15px 15px 15px; 
            background: white; 
            border-top: 1px solid #ddd; 
            flex: 0 0 auto;
        }
        button, .btn-link { padding: 14px 10px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block; box-sizing: border-box; }
        .btn-start { background: #27ae60; color: white; margin-top: 20px; width: 100%; }
        
        /* Instagram Button Styling */
        .btn-insta {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white;
            margin-top: 10px;
            margin-bottom: 20px;
            width: 100%;
        }

        .btn-action { background: #ecf0f1; color: #2c3e50; transition: background 0.2s; }
        .btn-action:active { background: #bdc3c7; }

        /* Small screen adjustments */
        @media (max-height: 600px) {
            .top-bar { padding: 8px 12px; }
            button, .btn-link { padding: 12px 8px; font-size: 13px; }
            .grid { padding: 10px; gap: 8px; }
        }
    </style>
</head>
<body>

<div id="app">
    <div id="start-screen" class="screen active">
        <h2>Welcome to OrthoGame</h2>
        <p>Analyze the patient's case and tap the correct treatment option before the timer runs out!</p>
        <button class="btn-start" onclick="startGame()">Start Game</button>
    </div>

    <div id="game-screen" class="screen" style="padding:0; justify-content: flex-start;">
        <div class="top-bar">
            <div style="font-size: 11px; text-transform: uppercase;">Clinic Reputation</div>
            <div class="rep-bar-bg"><div id="rep-bar"></div></div>
            <div class="stats">
                <span id="timer">00:30</span>
                <span id="counter">Case 1/5</span>
            </div>
        </div>
        
        <div id="card-area"></div>
        
        <div class="grid">
            <button class="btn-action" onclick="makeChoice('extract')">Extract</button>
            <button class="btn-action" onclick="makeChoice('ipr')">IPR</button>
            <button class="btn-action" onclick="makeChoice('nothing')">Do Nothing</button>
            <button class="btn-action" onclick="makeChoice('dontknow')">Don't Know</button>
        </div>
    </div>

    <div id="end-screen" class="screen">
        <h1 id="end-title">Game Over</h1>
        <p id="end-msg"></p>
        <h2 style="font-size: 3rem; margin: 10px 0;"><span id="final-score">0</span>%</h2>
        <p style="color: #7f8c8d; margin-bottom: 15px;">(Pass mark is 80%)</p>
        
        <!-- Instagram link container -->
        <div id="insta-link-container" style="display: none; width: 100%;">
            <a href="https://www.instagram.com/metadent.academy/" target="_blank" class="btn-link btn-insta">📸 View Course on Instagram</a>
        </div>

        <button class="btn-start" onclick="location.reload()">Play Again</button>
    </div>
</div>

<script>
    // Game Data pointing directly to your PNG files, mapping to the new button logic
    const cases = [
        { time: 30, ans: 'extract', image: 'case1.png' },
        { time: 30, ans: 'ipr', image: 'case2.png' },
        { time: 30, ans: 'extract', image: 'case3.png' },
        { time: 30, ans: 'ipr', image: 'case4.png' },
        { time: 30, ans: 'nothing', image: 'case5.png' }
    ];

    let currentIndex = 0;
    let score = 0;
    let timeLeft = 0;
    let timerId = null;

    function startGame() {
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        currentIndex = 0;
        score = 0;
        updateScoreBar();
        loadCase();
    }

    function loadCase() {
        if (currentIndex >= cases.length) {
            endGame();
            return;
        }
        const current = cases[currentIndex];
        
        const cardArea = document.getElementById('card-area');
        cardArea.style.backgroundImage = `url('${current.image}')`;
        cardArea.style.backgroundSize = 'contain';
        cardArea.style.backgroundPosition = 'center';
        cardArea.style.backgroundRepeat = 'no-repeat';
        
        document.getElementById('counter').innerText = `Case ${currentIndex + 1}/5`;
        
        timeLeft = current.time;
        updateTimerUI();
        
        clearInterval(timerId);
        timerId = setInterval(() => {
            timeLeft--;
            updateTimerUI();
            if (timeLeft <= 0) {
                processAnswer('timeout');
            }
        }, 1000);
    }

    function updateTimerUI() {
        const t = document.getElementById('timer');
        t.innerText = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
        if (timeLeft <= 5) {
            t.classList.add('danger');
        } else {
            t.classList.remove('danger');
        }
    }

    function makeChoice(action) {
        processAnswer(action);
    }

    function processAnswer(action) {
        clearInterval(timerId);
        const current = cases[currentIndex];
        
        if (action === 'timeout') {
            score -= 30;
        } else if (action === 'dontknow') {
            score -= 5;
        } else if (action === current.ans) {
            score += 20;
        } else {
            score -= 30;
        }
        
        updateScoreBar();
        currentIndex++;
        
        setTimeout(loadCase, 250); 
    }

    function updateScoreBar() {
        if (score > 100) score = 100;
        if (score < 0) score = 0;
        
        const bar = document.getElementById('rep-bar');
        bar.style.width = score + '%';
        
        if (score < 40) bar.style.background = '#e74c3c'; 
        else if (score < 80) bar.style.background = '#f1c40f'; 
        else bar.style.background = '#27ae60'; 
    }

    function endGame() {
        clearInterval(timerId);
        document.getElementById('game-screen').classList.remove('active');
        document.getElementById('end-screen').classList.add('active');
        
        document.getElementById('final-score').innerText = score;
        
        if (score >= 80) {
            document.getElementById('end-title').innerText = "Fantastic!";
            document.getElementById('end-msg').innerText = "You're an Ortho Wizard! Your schedule is booked out for months.";
            document.getElementById('insta-link-container').style.display = "none"; 
        } else {
            document.getElementById('end-title').innerText = "Poor!";
            document.getElementById('end-msg').innerText = "Yikes, looks like you need to attend an Ortho course";
            document.getElementById('insta-link-container').style.display = "block"; 
        }
    }
</script>

</body>
</html>
